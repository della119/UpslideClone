<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Upslide Clone</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <link rel="stylesheet" href="taskpane.css" />
  </head>
  <body>
    <header>
      <h1>Upslide Clone</h1>
      <p class="sub">Phase 1 · Smart Format + Waterfall</p>
    </header>

    <section>
      <h2>Formatting</h2>
      <button id="btn-format" class="action">Smart Format table</button>
      <p class="hint">Select a financial table (labels + headers + values), then apply branded formatting.</p>
    </section>

    <section>
      <h2>Charts</h2>
      <button id="btn-waterfall" class="action">Build Waterfall</button>
      <p class="hint">Select a two-column table (label + value). Totals are auto-detected as anchor bars.</p>
    </section>

    <div id="status" class="status" role="status"></div>
  </body>
</html>
